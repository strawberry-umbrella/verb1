
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); direction: rtl; }
.game { padding: 1.5rem 0; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.progress { display: flex; gap: 6px; }
.prog-dot { width: 10px; height: 10px; border-radius: 50%; background: #CECBF6; transition: background 0.3s; }
.prog-dot.done { background: #534AB7; }
.prog-dot.current { background: #7F77DD; }
.qnum { font-size: 13px; color: var(--color-text-secondary); }
.sentence-card { background: #EEEDFE; border-radius: var(--border-radius-lg); padding: 1.75rem 1.5rem; margin-bottom: 1.5rem; text-align: center; }
.sentence-text { font-size: 28px; font-weight: 500; color: #26215C; line-height: 1.7; direction: rtl; }
.verb-hl { background: #534AB7; color: #EEEDFE; border-radius: 6px; padding: 2px 10px; display: inline-block; }
.table-wrap { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: 1.25rem; }
table { width: 100%; border-collapse: collapse; table-layout: fixed; }
thead tr { background: #534AB7; }
thead th { color: #EEEDFE; font-size: 15px; font-weight: 500; padding: 12px 8px; text-align: center; }
thead th:not(:last-child) { border-left: 1px solid #3C3489; }
tbody td { padding: 10px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); text-align: center; vertical-align: middle; }
tbody td input, tbody td select { width: 100%; border: 1.5px solid #CECBF6; border-radius: 6px; padding: 8px 6px; font-size: 15px; text-align: center; background: #EEEDFE; color: #26215C; outline: none; appearance: none; -webkit-appearance: none; direction: rtl; }
tbody td input:focus, tbody td select:focus { border-color: #534AB7; background: #fff; }
tbody td input.ok { border-color: #3B6D11; background: #EAF3DE; color: #173404; }
tbody td input.err { border-color: #A32D2D; background: #FCEBEB; color: #501313; }
tbody td select.ok { border-color: #3B6D11; background: #EAF3DE; color: #173404; }
tbody td select.err { border-color: #A32D2D; background: #FCEBEB; color: #501313; }
.result-row td { background: var(--color-background-secondary); font-size: 13px; color: var(--color-text-secondary); padding: 6px 8px; }
.result-row .correct-val { color: #27500A; font-weight: 500; }
.btn-row { display: flex; gap: 10px; margin-bottom: 1rem; }
.btn-check { flex: 1; padding: 0.75rem; background: #534AB7; color: #EEEDFE; border: none; border-radius: var(--border-radius-md); font-size: 16px; cursor: pointer; font-weight: 500; }
.btn-check:hover { background: #3C3489; }
.btn-next { flex: 1; padding: 0.75rem; background: var(--color-background-primary); color: var(--color-text-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 16px; cursor: pointer; display: none; }
.btn-next:hover { background: var(--color-background-secondary); }
.score-strip { display: flex; gap: 10px; margin-bottom: 1rem; }
.sc { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px; text-align: center; flex: 1; }
.sc-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 2px; }
.sc-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.results-page { display: none; padding: 1rem 0; }
.res-header { background: #534AB7; border-radius: var(--border-radius-lg); padding: 1.5rem; text-align: center; margin-bottom: 1.5rem; }
.res-title { font-size: 22px; font-weight: 500; color: #EEEDFE; margin-bottom: 4px; }
.res-sub { font-size: 14px; color: #AFA9EC; }
.res-score-big { font-size: 48px; font-weight: 500; color: #EEEDFE; margin: 0.5rem 0; }
.res-table-wrap { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: 1.25rem; }
.res-table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 13px; }
.res-table th { background: #EEEDFE; color: #3C3489; padding: 8px 6px; text-align: center; font-weight: 500; border-bottom: 0.5px solid #CECBF6; }
.res-table td { padding: 8px 6px; text-align: center; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
.res-table td.wrong-cell { color: #A32D2D; }
.res-table td.right-cell { color: #27500A; }
.res-table tr:last-child td { border-bottom: none; }
.res-table .sentence-col { text-align: right; font-size: 12px; }
.btn-restart { width: 100%; padding: 0.75rem; background: #534AB7; color: #EEEDFE; border: none; border-radius: var(--border-radius-md); font-size: 16px; cursor: pointer; font-weight: 500; }
.btn-restart:hover { background: #3C3489; }
.print-note { font-size: 12px; color: var(--color-text-secondary); text-align: center; margin-bottom: 1rem; }
</style>

<div class="game" id="game">
  <h2 class="sr-only">משחק ניתוח פעלים בעברית — שורש, גוף, זמן, בניין</h2>

  <div class="header">
    <div class="progress" id="progress"></div>
    <div class="qnum" id="qnum">שאלה 1 מתוך 10</div>
  </div>

  <div class="score-strip">
    <div class="sc"><div class="sc-label">נכון</div><div class="sc-val" id="sc-correct">0</div></div>
    <div class="sc"><div class="sc-label">שגוי</div><div class="sc-val" id="sc-wrong">0</div></div>
    <div class="sc"><div class="sc-label">ניקוד</div><div class="sc-val" id="sc-score">0</div></div>
  </div>

  <div class="sentence-card">
    <div class="sentence-text" id="sentence-text"></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>שורש</th>
          <th>גוף</th>
          <th>זמן</th>
          <th>בניין</th>
        </tr>
      </thead>
      <tbody>
        <tr id="input-row">
          <td><input type="text" id="f-root" placeholder="כ-ת-ב" maxlength="10" /></td>
          <td>
            <select id="f-guf">
              <option value="">בחר...</option>
              <option>מדבר</option><option>מדברת</option><option>מדברים</option><option>מדברות</option>
              <option>נוכח</option><option>נוכחת</option><option>נוכחים</option><option>נוכחות</option>
              <option>נסתר</option><option>נסתרת</option><option>נסתרים</option><option>נסתרות</option>
            </select>
          </td>
          <td>
            <select id="f-zman">
              <option value="">בחר...</option>
              <option>עבר</option><option>הווה</option><option>עתיד</option>
            </select>
          </td>
          <td>
            <select id="f-binyan">
              <option value="">בחר...</option>
              <option>פעל</option><option>נפעל</option><option>הפעיל</option><option>הופעל</option>
              <option>פיעל</option><option>פועל</option><option>התפעל</option>
            </select>
          </td>
        </tr>
        <tr id="result-row" style="display:none" class="result-row">
          <td id="r-root"></td><td id="r-guf"></td><td id="r-zman"></td><td id="r-binyan"></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="btn-row">
    <button class="btn-check" id="btn-check" onclick="checkAnswer()">בדוק תשובה</button>
    <button class="btn-next" id="btn-next" onclick="nextQ()">המשך ←</button>
  </div>
</div>

<div class="results-page" id="results-page">
  <div class="res-header">
    <div class="res-title" id="res-title">סיכום תוצאות</div>
    <div class="res-score-big" id="res-score-big"></div>
    <div class="res-sub" id="res-sub"></div>
  </div>
  <p class="print-note">אפשר לצלם מסך ולשלוח למורה</p>
  <div class="res-table-wrap">
    <table class="res-table" id="res-table">
      <thead>
        <tr>
          <th style="width:28%">משפט / פועל</th>
          <th style="width:18%">שורש</th>
          <th style="width:18%">גוף</th>
          <th style="width:18%">זמן</th>
          <th style="width:18%">בניין</th>
        </tr>
      </thead>
      <tbody id="res-tbody"></tbody>
    </table>
  </div>
  <button class="btn-restart" onclick="restartGame()">שחק שוב</button>
</div>

<script>
const QUESTIONS = [
  { sentence: "המורה לימדה חומר למבחן", verb: "לימדה", root: "למד", guf: "נסתרת", zman: "עבר", binyan: "פיעל" },
  { sentence: "הילדים שיחקו בחוץ בכדור", verb: "שיחקו", root: "שחק", guf: "נסתרים", zman: "עבר", binyan: "פיעל" },
  { sentence: "התמונה נגזרה מהעיתון", verb: "נגזרה", root: "גזר", guf: "נסתרת", zman: "עבר", binyan: "נפעל" },
  { sentence: "המטמון הוחבא היטב", verb: "הוחבא", root: "חבא", guf: "נסתר", zman: "עבר", binyan: "הופעל" },
  { sentence: "אתם תתגלגלו על הדשא", verb: "תתגלגלו", root: "גלגל", guf: "נוכחים", zman: "עתיד", binyan: "התפעל" },
  { sentence: "הקניון מאובטח היטב", verb: "מאובטח", root: "אבטח", guf: "נסתר", zman: "הווה", binyan: "פועל" },
  { sentence: "האריות יוכנסו לכלוב", verb: "יוכנסו", root: "כנס", guf: "נסתרים", zman: "עתיד", binyan: "הופעל" },
  { sentence: "אנחנו נשמור על הסביבה", verb: "נשמור", root: "שמר", guf: "מדברים", zman: "עתיד", binyan: "פעל" },
  { sentence: "הילדות ילכו למגרש", verb: "ילכו", root: "הלכ", guf: "נסתרות", zman: "עתיד", binyan: "פעל" },
  { sentence: "הפגישה תסוכם ע\"י המשתתפים", verb: "תסוכם", root: "סכמ", guf: "נסתרת", zman: "עתיד", binyan: "פועל" }
];

const ROOT_ALTS = {
  "למד": ["למד","ל-מ-ד","למ\"ד"],
  "שחק": ["שחק","ש-ח-ק"],
  "גזר": ["גזר","ג-ז-ר"],
  "חבא": ["חבא","ח-ב-א"],
  "גלגל": ["גלגל","ג-ל-ג-ל"],
  "אבטח": ["אבטח","א-ב-ט-ח"],
  "כנס": ["כנס","כ-נ-ס","כנ\"ס"],
  "שמר": ["שמר","ש-מ-ר"],
  "הלכ": ["הלכ","ה-ל-כ","הלך","ה-ל-ך"],
  "סכמ": ["סכמ","ס-כ-מ","סכם","ס-כ-ם"]
};

const COLORS = ["#534AB7","#0F6E56","#993C1D","#854F0B","#185FA5","#3B6D11","#993556"];
let qIdx = 0, correctCount = 0, wrongCount = 0, totalScore = 0;
let history = [];
let checked = false;

function normRoot(s) {
  return s.trim().replace(/[-–—\s'"״]/g,"").replace(/ך/g,"כ").replace(/ם/g,"מ").replace(/ן/g,"נ").replace(/ף/g,"פ").replace(/ץ/g,"צ").toLowerCase();
}

function checkRoot(user, correct) {
  const u = normRoot(user);
  const alts = ROOT_ALTS[correct] || [correct];
  return alts.some(a => normRoot(a) === u);
}

function buildProgress() {
  const p = document.getElementById("progress");
  p.innerHTML = "";
  for (let i = 0; i < 10; i++) {
    const d = document.createElement("div");
    d.className = "prog-dot" + (i < qIdx ? " done" : i === qIdx ? " current" : "");
    p.appendChild(d);
  }
}

function renderQuestion() {
  checked = false;
  const q = QUESTIONS[qIdx];
  document.getElementById("qnum").textContent = `שאלה ${qIdx+1} מתוך 10`;
  buildProgress();

  const hl = q.sentence.replace(q.verb, `<span class="verb-hl">${q.verb}</span>`);
  document.getElementById("sentence-text").innerHTML = hl;

  ["f-root","f-guf","f-zman","f-binyan"].forEach(id => {
    const el = document.getElementById(id);
    el.value = ""; el.className = ""; el.disabled = false;
  });
  document.getElementById("result-row").style.display = "none";
  document.getElementById("btn-check").style.display = "block";
  document.getElementById("btn-next").style.display = "none";

  document.getElementById("f-root").focus();
}

function setFieldNav() {
  const ids = ["f-root","f-guf","f-zman","f-binyan"];
  ids.forEach((id, i) => {
    const el = document.getElementById(id);
    el.addEventListener("keydown", function(e) {
      if (e.key === "Tab") return;
      if (e.key === "Enter" || e.key === "ArrowLeft") {
        e.preventDefault();
        const next = ids[i+1];
        if (next) document.getElementById(next).focus();
        else document.getElementById("btn-check").click();
      }
    });
  });
}

function checkAnswer() {
  if (checked) return;
  checked = true;
  const q = QUESTIONS[qIdx];
  const userRoot = document.getElementById("f-root").value;
  const userGuf = document.getElementById("f-guf").value;
  const userZman = document.getElementById("f-zman").value;
  const userBinyan = document.getElementById("f-binyan").value;

  const res = {
    root: checkRoot(userRoot, q.root),
    guf: userGuf === q.guf,
    zman: userZman === q.zman,
    binyan: userBinyan === q.binyan
  };

  const fields = ["root","guf","zman","binyan"];
  const inputIds = ["f-root","f-guf","f-zman","f-binyan"];
  const resultIds = ["r-root","r-guf","r-zman","r-binyan"];
  const corrects = [q.root, q.guf, q.zman, q.binyan];
  const userVals = [userRoot, userGuf, userZman, userBinyan];

  let pts = 0;
  fields.forEach((f, i) => {
    const el = document.getElementById(inputIds[i]);
    el.disabled = true;
    el.className = res[f] ? "ok" : "err";
    if (res[f]) pts++;
    const rd = document.getElementById(resultIds[i]);
    if (!res[f]) {
      rd.innerHTML = `<span class="correct-val">${corrects[i]}</span>`;
    } else {
      rd.innerHTML = `<span style="color:#27500A">✓</span>`;
    }
  });

  document.getElementById("result-row").style.display = "";

  const allOk = pts === 4;
  if (allOk) correctCount++; else wrongCount++;
  totalScore += pts;
  document.getElementById("sc-correct").textContent = correctCount;
  document.getElementById("sc-wrong").textContent = wrongCount;
  document.getElementById("sc-score").textContent = totalScore;

  history.push({ q, userRoot, userGuf, userZman, userBinyan, res });

  document.getElementById("btn-check").style.display = "none";
  document.getElementById("btn-next").style.display = "block";
  document.getElementById("btn-next").textContent = qIdx < 9 ? "המשך ←" : "לדף תוצאות ←";
}

function nextQ() {
  qIdx++;
  if (qIdx >= 10) { showResults(); return; }
  renderQuestion();
}

function showResults() {
  document.getElementById("game").style.display = "none";
  document.getElementById("results-page").style.display = "block";

  const pct = Math.round((totalScore / 40) * 100);
  const msg = pct === 100 ? "מושלם!" : pct >= 80 ? "כל הכבוד!" : pct >= 60 ? "לא רע!" : "המשך להתאמן!";
  document.getElementById("res-title").textContent = msg;
  document.getElementById("res-score-big").textContent = `${totalScore} / 40`;
  document.getElementById("res-sub").textContent = `${correctCount} משפטים מושלמים מתוך 10`;

  const tbody = document.getElementById("res-tbody");
  tbody.innerHTML = "";
  history.forEach((h, i) => {
    const color = COLORS[i % COLORS.length];
    const tr = document.createElement("tr");
    const fields = ["root","guf","zman","binyan"];
    const corrects = [h.q.root, h.q.guf, h.q.zman, h.q.binyan];
    const userVals = [h.userRoot, h.userGuf, h.userZman, h.userBinyan];
    tr.innerHTML = `<td class="sentence-col"><span style="background:${color};color:#fff;border-radius:4px;padding:1px 6px;font-size:11px;">${i+1}</span> ${h.q.verb}</td>` +
      fields.map((f,fi) => `<td class="${h.res[f]?"right-cell":"wrong-cell"}">${h.res[f] ? corrects[fi] : `<del style="color:#A32D2D;font-size:11px">${userVals[fi]||"—"}</del><br>${corrects[fi]}`}</td>`).join("");
    tbody.appendChild(tr);
  });
}

function restartGame() {
  qIdx = 0; correctCount = 0; wrongCount = 0; totalScore = 0; history = [];
  document.getElementById("sc-correct").textContent = 0;
  document.getElementById("sc-wrong").textContent = 0;
  document.getElementById("sc-score").textContent = 0;
  document.getElementById("game").style.display = "block";
  document.getElementById("results-page").style.display = "none";
  renderQuestion();
}

setFieldNav();
renderQuestion();
</script>
